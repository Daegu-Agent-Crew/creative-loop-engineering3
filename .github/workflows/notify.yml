name: CLE3 Pipeline Notify
on:
  push:
    branches: [main]
    paths:
      - 'episodes/**'
      - 'state.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read state
        id: state
        run: |
          STATE=$(cat state.json | jq -c .)
          echo "state=$STATE" >> $GITHUB_OUTPUT
      - name: Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          STATE='${{ steps.state.outputs.state }}'
          EPISODE=$(echo "$STATE" | jq -r '.current_episode // "unknown"')
          PHASE=$(echo "$STATE" | jq -r '.current_phase // "unknown"')
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"🎬 CLE3 Pipeline Triggered\nEpisode: $EPISODE\nPhase: $PHASE\nRepo: $GITHUB_REPOSITORY\nCommit: $GITHUB_SHA\"}"
