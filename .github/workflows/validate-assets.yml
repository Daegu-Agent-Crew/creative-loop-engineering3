name: Validate panel assets

on:
  pull_request:
    paths:
      - 'episodes/**'
      - 'config/asset-storage-policy.json'
      - 'scripts/check-panel-assets.js'
  push:
    branches: [main]
    paths:
      - 'episodes/**'
      - 'config/asset-storage-policy.json'
      - 'scripts/check-panel-assets.js'

jobs:
  validate-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Check panel assets
        run: node scripts/check-panel-assets.js
