<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLE3 — Creative Loop Engineering</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --accent: #58a6ff;
      --dim: #8b949e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    .container { max-width: 720px; width: 100%; }
    .header { text-align: center; margin-bottom: 3rem; }
    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--accent), #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .header p { color: var(--dim); font-size: 1.1rem; }
    .pipeline {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .phase {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.2s;
    }
    .phase:hover { border-color: var(--accent); }
    .phase-num {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 2rem;
    }
    .phase-info h3 { font-size: 1.1rem; margin-bottom: 0.2rem; }
    .phase-info p { color: var(--dim); font-size: 0.9rem; }
    .footer {
      text-align: center;
      color: var(--dim);
      font-size: 0.85rem;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    .badge {
      display: inline-block;
      background: #238636;
      color: #fff;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      margin-left: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>CLE3</h1>
      <p>Creative Loop Engineering · AI 웹툰 파이프라인</p>
    </div>
    <div class="pipeline">
      <div class="phase">
        <span class="phase-num">1</span>
        <div class="phase-info">
          <h3>Story</h3>
          <p>원작 텍스트를 웹툰 장면/대사로 각색</p>
        </div>
      </div>
      <div class="phase">
        <span class="phase-num">2</span>
        <div class="phase-info">
          <h3>Characters</h3>
          <p>캐릭터 외모, 성격, 스타일 명세 생성</p>
        </div>
      </div>
      <div class="phase">
        <span class="phase-num">3</span>
        <div class="phase-info">
          <h3>Storyboard</h3>
          <p>페이지 레이아웃 및 패널 구성</p>
        </div>
      </div>
      <div class="phase">
        <span class="phase-num">4</span>
        <div class="phase-info">
          <h3>Panels</h3>
          <p>패널 이미지 생성 및 스타일 적용</p>
        </div>
      </div>
      <div class="phase">
        <span class="phase-num">5</span>
        <div class="phase-info">
          <h3>QA <span class="badge">Gate</span></h3>
          <p>품질 보증 및 수정 루프</p>
        </div>
      </div>
      <div class="phase">
        <span class="phase-num">6</span>
        <div class="phase-info">
          <h3>Deploy</h3>
          <p>GitHub Pages 배포</p>
        </div>
      </div>
    </div>
    <div class="footer">
      CLE3 · Creative Loop Engineering 3 · 2026
    </div>
  </div>
</body>
</html>
