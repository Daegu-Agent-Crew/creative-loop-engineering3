<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 CLE3 — 삼체 만화 창작 시스템</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #c8c8e8;
  font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
  min-height: 100vh;
}

/* Stars */
.stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
.star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite; }
@keyframes twinkle { 0%,100% { opacity: 0.15; } 50% { opacity: 0.8; } }

#app { position: relative; z-index: 1; min-height: 100vh; }

/* Navbar */
.navbar {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  padding: 0.75rem 1.5rem;
  background: rgba(15, 15, 35, 0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(100, 100, 150, 0.2);
  position: sticky; top: 0; z-index: 100;
}
.navbar a {
  color: #8888bb; text-decoration: none;
  padding: 0.5rem 0.8rem; border-radius: 6px;
  font-size: 0.9rem; transition: all 0.2s;
}
.navbar a:hover { background: rgba(139, 126, 216, 0.15); color: #c8c8e8; }
.navbar a.active { background: rgba(139, 126, 216, 0.25); color: #8b7ed8; }

/* Content */
.content { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
.content h2 { color: #8b7ed8; font-size: 1.5rem; margin-bottom: 1rem; }
.loading { text-align: center; padding: 3rem; color: #555; }

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 1rem; margin-bottom: 1.5rem;
}
.stat-card {
  background: rgba(20, 20, 40, 0.6);
  border: 1px solid rgba(100, 100, 150, 0.2);
  border-radius: 10px; padding: 1rem; text-align: center;
}
.stat-value { font-size: 1.8rem; font-weight: bold; color: #8b7ed8; }
.stat-label { font-size: 0.8rem; color: #666; margin-top: 0.3rem; }

/* Card */
.card {
  background: rgba(20, 20, 40, 0.6);
  border: 1px solid rgba(100, 100, 150, 0.2);
  border-radius: 10px; padding: 1.2rem; margin: 0.8rem 0;
}
.card h3 { color: #8b7ed8; font-size: 1.1rem; margin-bottom: 0.6rem; }
.card p { line-height: 1.6; color: #aaaacc; margin: 0.3rem 0; }
.card a { color: #6ba3e8; text-decoration: none; }
.card a:hover { text-decoration: underline; }
.meta { font-size: 0.8rem; color: #555; }
.warn { color: #ffc107; font-size: 0.85rem; }
.mode-banner {
  background: rgba(107, 163, 232, 0.12);
  border: 1px solid rgba(107, 163, 232, 0.25);
  border-radius: 6px;
  padding: 0.5rem 1rem;
  margin: 0.5rem 1.5rem;
  font-size: 0.85rem;
  color: #9dc5f3;
}

/* Badges */
.badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; }
.badge-open { background: rgba(40, 167, 69, 0.2); color: #28a745; }
.badge-closed { background: rgba(23, 162, 184, 0.2); color: #17a2b8; }
.badge-pending { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
.badge-active { background: rgba(40, 167, 69, 0.2); color: #28a745; }
.badge-completed { background: rgba(23, 162, 184, 0.2); color: #17a2b8; }

/* Pipeline visual */
.pipeline-visual {
  display: flex; align-items: center; flex-wrap: wrap; gap: 0.3rem;
  justify-content: center; margin: 1rem 0;
}
.pipe-phase {
  text-align: center; padding: 0.5rem;
  border-radius: 8px; min-width: 70px;
  border: 1px solid rgba(100,100,150,0.2);
  background: rgba(20,20,40,0.4);
  position: relative;
}
.pipe-phase.completed { border-color: rgba(23,162,184,0.5); background: rgba(23,162,184,0.1); }
.pipe-phase.active { border-color: rgba(139,126,216,0.6); background: rgba(139,126,216,0.15); animation: pulse 2s infinite; }
.pipe-num {
  width: 1.5rem; height: 1.5rem; line-height: 1.5rem;
  border-radius: 50%; background: #333; color: #aaa;
  font-size: 0.75rem; margin: 0 auto 0.3rem;
}
.pipe-phase.completed .pipe-num { background: #17a2b8; color: #fff; }
.pipe-phase.active .pipe-num { background: #8b7ed8; color: #0a0a1a; }
.pipe-name { font-size: 0.75rem; }
.pipe-check { font-size: 0.8rem; margin-top: 0.2rem; }
.pipe-pulse { font-size: 0.8rem; margin-top: 0.2rem; }
.pipe-arrow { color: #444; font-size: 0.8rem; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

/* Phase list */
.phase-list { display: flex; flex-direction: column; gap: 0.5rem; }
.phase-row {
  display: flex; align-items: center; gap: 0.8rem;
  padding: 0.8rem; border-radius: 8px;
  background: rgba(20,20,40,0.4);
  border: 1px solid rgba(100,100,150,0.15);
}
.phase-row.completed { border-color: rgba(23,162,184,0.4); }
.phase-row.active { border-color: rgba(139,126,216,0.5); }
.phase-icon { font-size: 1.2rem; }
.phase-info { flex: 1; }
.phase-title { font-weight: 500; color: #c8c8e8; }
.phase-desc { font-size: 0.8rem; color: #666; }
.phase-score { font-size: 0.75rem; color: #8b7ed8; margin-top: 0.2rem; }
.phase-badge {
  padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem;
}
.phase-badge.completed { background: rgba(23,162,184,0.2); color: #17a2b8; }
.phase-badge.active { background: rgba(40,167,69,0.2); color: #28a745; }
.phase-badge.pending { background: rgba(255,193,7,0.15); color: #ffc107; }

/* Commits */
.commit {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.4rem 0; border-bottom: 1px solid rgba(50,50,80,0.3);
  font-size: 0.85rem;
}
.commit .sha { color: #8b7ed8; font-size: 0.8rem; }
.commit .msg { color: #aaaacc; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.commit .meta { color: #555; font-size: 0.75rem; }

/* Settings */
.input-group { display: flex; gap: 0.5rem; margin: 0.8rem 0; }
.pat-input {
  flex: 1; padding: 0.5rem 0.8rem;
  background: rgba(10,10,25,0.8); border: 1px solid rgba(100,100,150,0.3);
  border-radius: 6px; color: #c8c8e8; font-size: 0.9rem;
}
.btn { padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
.btn-primary { background: #8b7ed8; color: #0a0a1a; }
.btn-danger { background: #e11d48; color: #fff; }

/* Budget */
.budget-bar {
  height: 8px; background: rgba(30,30,60,0.5);
  border-radius: 4px; overflow: hidden; margin: 0.5rem 0;
}
.budget-fill {
  height: 100%; background: linear-gradient(90deg, #8b7ed8, #6ba3e8);
  border-radius: 4px; transition: width 0.5s;
}

/* Prompt list */
.prompt-list { list-style: none; margin: 0.5rem 0; }
.prompt-list li {
  padding: 0.4rem 0; color: #aaaacc;
  font-family: monospace; font-size: 0.85rem;
}

/* Toast */
.toast {
  position: fixed; bottom: 2rem; right: 2rem;
  padding: 0.8rem 1.2rem; border-radius: 8px;
  font-size: 0.9rem; z-index: 9999;
  animation: slideIn 0.3s ease-out;
}
.toast-success { background: rgba(40,167,69,0.9); color: #fff; }
.toast-error { background: rgba(220,53,69,0.9); color: #fff; }
.toast-info { background: rgba(139,126,216,0.9); color: #fff; }
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Header */
.header { text-align: center; padding: 2rem 1rem 1rem; }
.header h1 { font-size: 2.5rem; color: #8b7ed8; text-shadow: 0 0 30px rgba(139,126,216,0.4); }
.header .subtitle { font-size: 1.1rem; color: #6ba3e8; margin-top: 0.3rem; }

/* Phase output */
.phase-output { margin: 0 0 0 2.5rem; padding: 0.5rem 0 0.5rem 1rem; border-left: 2px solid rgba(139,126,216,0.3); }
.expand-btn { font-size: 0.8rem; color: #6ba3e8; text-decoration: none; margin-left: 0.5rem; }
.expand-btn:hover { text-decoration: underline; }
.output-section { margin: 0.5rem 0; }
.output-section h4 { color: #8b7ed8; font-size: 1rem; margin-bottom: 0.3rem; }
.output-item { padding: 0.4rem 0; border-bottom: 1px solid rgba(50,50,80,0.2); }
.output-title { color: #c8c8e8; font-weight: 500; font-size: 0.9rem; }
.output-desc { color: #aaaacc; font-size: 0.85rem; margin: 0.2rem 0; }
.output-prompt { font-family: monospace; font-size: 0.75rem; color: #666; background: rgba(10,10,25,0.5); padding: 0.3rem; border-radius: 4px; margin: 0.2rem 0; }
.output-md { white-space: pre-wrap; word-break: break-word; color: #aaaacc; font-size: 0.8rem; background: rgba(10,10,25,0.5); padding: 0.8rem; border-radius: 6px; overflow-x: auto; }
.placeholder-small { font-size: 0.75rem; color: #444; padding: 0.3rem; text-align: center; border: 1px dashed rgba(100,100,150,0.2); border-radius: 4px; margin: 0.2rem 0; }
.character-sheet-image {
  width: 100%;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid rgba(100,100,150,0.2);
  background: rgba(10,10,25,0.6);
  margin: 0.5rem 0 0.8rem;
}
.character-sheet-placeholder {
  min-height: 220px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.4rem;
  padding: 1rem;
  border-radius: 8px;
  border: 1px dashed rgba(100,100,150,0.3);
  background: rgba(10,10,25,0.45);
  margin: 0.5rem 0 0.8rem;
}
.reference-strip {
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
  margin-top: 0.6rem;
}
.reference-chip {
  width: 92px;
  background: rgba(10,10,25,0.5);
  border: 1px solid rgba(100,100,150,0.25);
  border-radius: 8px;
  overflow: hidden;
}
.reference-thumb {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
  background: rgba(10,10,25,0.7);
}
.reference-caption {
  padding: 0.4rem 0.45rem 0.5rem;
  font-size: 0.72rem;
  color: #aaaacc;
  line-height: 1.35;
}
.storyboard-overview-card {
  border-bottom: 1px solid rgba(100,100,150,0.28);
  margin-bottom: 1rem;
  padding-bottom: 1rem;
}
.storyboard-overview-image {
  width: min(100%, 760px);
  display: block;
  margin-top: 0.8rem;
  border-radius: 10px;
  border: 1px solid rgba(150,150,220,0.28);
  background: rgba(10,10,25,0.7);
  box-shadow: 0 18px 48px rgba(0,0,0,0.32);
}
.panel-preview-image {
  width: 100%;
  max-height: 360px;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid rgba(100,100,150,0.25);
  background: rgba(10,10,25,0.7);
  margin: 0.5rem 0 0.8rem;
}
.panel-preview-frame {
  position: relative;
  width: 100%;
  margin: 0.5rem 0 0.8rem;
}
.panel-preview-frame .panel-preview-image {
  width: 100%;
  max-height: none;
  margin: 0;
}
.panel-preview-overlay {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
  padding: 0.2rem 0.4rem;
  text-align: center;
  color: #111;
  background: rgba(255,255,255,0.92);
  border: 2px solid rgba(0,0,0,0.8);
  border-radius: 999px;
  font-weight: 800;
  line-height: 1.2;
  pointer-events: none;
}
.panel-preview-overlay-note {
  color: #d14b83;
  background: transparent;
  border: 0;
  text-shadow: 0 1px 0 #fff, 1px 0 0 #fff, 0 -1px 0 #fff, -1px 0 0 #fff;
  font-size: 1.25rem;
}
.panel-preview-overlay-caption,
.panel-preview-overlay-narration {
  color: #fff;
  background: rgba(0,0,0,0.78);
  border-radius: 8px;
}
.panel-preview-overlay-sfx {
  font-size: 1.4rem;
  border-radius: 8px;
}
.panel-placeholder {
  min-height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.4rem;
  padding: 1rem;
  border-radius: 8px;
  border: 1px dashed rgba(100,100,150,0.3);
  background: rgba(10,10,25,0.45);
  margin: 0.5rem 0 0.8rem;
}
.panel-meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 0.6rem;
  margin: 0.6rem 0 0.8rem;
}
.panel-meta-grid p {
  margin: 0;
}
.pat-banner { background: rgba(255,193,7,0.1); border: 1px solid rgba(255,193,7,0.3); border-radius: 6px; padding: 0.5rem 1rem; margin: 0.5rem 1.5rem; font-size: 0.85rem; }
.pat-banner a { color: #ffc107; }
.action-row { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; margin-top: 0.8rem; }
.btn-secondary { background: rgba(107, 163, 232, 0.18); color: #9dc5f3; border: 1px solid rgba(107, 163, 232, 0.25); }
.qa-input { width: 100%; }
.qa-textarea {
  width: 100%;
  min-height: 140px;
  resize: vertical;
  padding: 0.7rem 0.8rem;
  background: rgba(10,10,25,0.8);
  border: 1px solid rgba(100,100,150,0.3);
  border-radius: 6px;
  color: #c8c8e8;
  font-size: 0.9rem;
  font-family: inherit;
}
.qa-export-preview {
  max-height: 240px;
  overflow: auto;
}
.panel-review-card {
  padding: 1rem 0;
  border-top: 1px solid rgba(50,50,80,0.25);
}
.panel-review-card:first-of-type { border-top: 0; }
.panel-review-head {
  display: flex;
  justify-content: space-between;
  gap: 0.8rem;
  align-items: flex-start;
  margin-bottom: 0.5rem;
}
.panel-segmented {
  grid-template-columns: repeat(4, minmax(0, 1fr));
  margin-top: 0.75rem;
}
.panel-note {
  min-height: 88px;
  margin-top: 0.75rem;
}
.panel-criteria-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 0.65rem;
  margin-top: 0.75rem;
}
.panel-criteria-field {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  font-size: 0.8rem;
  color: #9ea1d5;
}
.panel-select {
  min-height: 36px;
  padding: 0.45rem 0.6rem;
  background: rgba(10,10,25,0.8);
  border: 1px solid rgba(100,100,150,0.3);
  border-radius: 6px;
  color: #c8c8e8;
}
.panel-criterion-summary {
  margin-top: 0.8rem;
}
.panel-qa-inline {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  flex-wrap: wrap;
  margin-top: 0.65rem;
}
.panel-qa-badge {
  display: inline-flex;
  min-height: 26px;
  align-items: center;
  padding: 0.1rem 0.5rem;
  border-radius: 999px;
  font-size: 0.76rem;
  border: 1px solid rgba(100,100,150,0.24);
}
.panel-qa-badge.approved { color: #99e0aa; border-color: rgba(40,167,69,0.45); }
.panel-qa-badge.changes_requested { color: #ff9fb3; border-color: rgba(225,29,72,0.42); }
.panel-qa-badge.hold { color: #f0d27b; border-color: rgba(255,193,7,0.38); }
.panel-qa-badge.pending { color: #9dc5f3; border-color: rgba(107,163,232,0.32); }
.segmented-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 0.45rem;
  margin-bottom: 0.9rem;
}
.segmented-btn {
  min-height: 36px;
  border-radius: 6px;
  border: 1px solid rgba(100,100,150,0.24);
  background: rgba(20,20,40,0.5);
  color: #b7b7dd;
  cursor: pointer;
  font-size: 0.84rem;
}
.segmented-btn.active.approved {
  background: rgba(40,167,69,0.2);
  border-color: rgba(40,167,69,0.45);
  color: #99e0aa;
}
.segmented-btn.active.changes {
  background: rgba(225,29,72,0.18);
  border-color: rgba(225,29,72,0.42);
  color: #ff9fb3;
}
.segmented-btn.active.hold {
  background: rgba(255,193,7,0.16);
  border-color: rgba(255,193,7,0.38);
  color: #f0d27b;
}
.segmented-btn.active.pending {
  background: rgba(107,163,232,0.14);
  border-color: rgba(107,163,232,0.32);
  color: #9dc5f3;
}
.btn-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 36px;
  padding: 0.45rem 0.8rem;
  border-radius: 6px;
  text-decoration: none;
  background: rgba(107, 163, 232, 0.12);
  border: 1px solid rgba(107, 163, 232, 0.22);
  color: #9dc5f3;
  font-size: 0.88rem;
}
.btn-link:hover { background: rgba(107, 163, 232, 0.2); }
.episode-mini-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 0.8rem;
}
.episode-mini-card {
  display: block;
  padding: 0.9rem;
  border-radius: 8px;
  text-decoration: none;
  background: rgba(20, 20, 40, 0.45);
  border: 1px solid rgba(100, 100, 150, 0.18);
}
.episode-mini-card:hover { border-color: rgba(139, 126, 216, 0.4); }
.episode-mini-title { color: #c8c8e8; font-weight: 600; margin-bottom: 0.25rem; }
.episode-mini-meta { color: #7777aa; font-size: 0.8rem; }
.workspace-shell {
  display: grid;
  grid-template-columns: 240px minmax(0, 1fr);
  gap: 1rem;
  align-items: start;
}
.workspace-sidebar {
  position: sticky;
  top: 5.25rem;
}
.workspace-sidebar h3 { color: #8b7ed8; margin-bottom: 0.8rem; }
.workspace-episode-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin-bottom: 1rem;
}
.workspace-episode-link {
  display: block;
  padding: 0.75rem 0.8rem;
  border-radius: 8px;
  border: 1px solid rgba(100, 100, 150, 0.18);
  background: rgba(20, 20, 40, 0.45);
  text-decoration: none;
  color: #c8c8e8;
}
.workspace-episode-link.active {
  border-color: rgba(139, 126, 216, 0.45);
  background: rgba(139, 126, 216, 0.12);
}
.workspace-main { min-width: 0; }
.workspace-header {
  display: flex;
  gap: 1rem;
  align-items: flex-start;
  justify-content: space-between;
}
.tab-row {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: 1rem;
}
.tab-chip {
  display: inline-flex;
  align-items: center;
  min-height: 34px;
  padding: 0.4rem 0.75rem;
  border-radius: 6px;
  text-decoration: none;
  background: rgba(20, 20, 40, 0.45);
  border: 1px solid rgba(100, 100, 150, 0.18);
  color: #9999c8;
  font-size: 0.85rem;
}
.tab-chip.active {
  color: #d3ccff;
  border-color: rgba(139, 126, 216, 0.45);
  background: rgba(139, 126, 216, 0.14);
}
.workspace-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1rem;
}
.compact-grid { margin-bottom: 0; }
.compact { padding: 1rem; }
.phase-chip-list {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.phase-chip {
  display: inline-flex;
  align-items: center;
  min-height: 30px;
  padding: 0.2rem 0.6rem;
  border-radius: 999px;
  font-size: 0.78rem;
  border: 1px solid rgba(100, 100, 150, 0.2);
}
.phase-chip.completed { color: #7fd9d9; border-color: rgba(23, 162, 184, 0.35); }
.phase-chip.active { color: #a4f1b4; border-color: rgba(40, 167, 69, 0.35); }
.phase-chip.pending { color: #d7b96e; border-color: rgba(255, 193, 7, 0.3); }
.scene-card {
  padding: 1rem 0;
  border-bottom: 1px solid rgba(50, 50, 80, 0.25);
}
.scene-card:last-child { border-bottom: 0; }
.panel-summary {
  padding: 0.6rem 0 0.2rem;
}
.stat-value.small { font-size: 1.4rem; }

@media (max-width: 600px) {
  .navbar { padding: 0.5rem; }
  .navbar a { padding: 0.4rem 0.5rem; font-size: 0.8rem; }
  .content { padding: 1rem; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .workspace-shell { grid-template-columns: 1fr; }
  .workspace-sidebar { position: static; }
  .workspace-header { flex-direction: column; }
  .segmented-row { grid-template-columns: 1fr 1fr; }
  .panel-segmented { grid-template-columns: 1fr 1fr; }
  .panel-review-head { flex-direction: column; }
  .panel-criteria-grid { grid-template-columns: 1fr; }
}
